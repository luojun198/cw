<!-- @dsCard group="Components" viewport="700x280" name="Forms — Input & Switch" subtitle="Labelled fields with mint focus ring + bubbly switch" -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-canvas);color:var(--text-body);padding:24px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start;}
  .stack{display:flex;flex-direction:column;gap:14px;}
</style></head><body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Input, Switch } = window.DesignSystem_6b732f;
    function Demo(){
      const [a,setA]=React.useState(true);
      const [b,setB]=React.useState(false);
      return (
        <div className="grid">
          <div className="stack">
            <Input label="邮箱" placeholder="you@example.com" hint="用于登录与通知" prefix={<i data-lucide="mail"></i>} />
            <Input label="金额" prefix="¥" defaultValue="3,280.00" />
            <Input label="发票号" error="格式不正确" defaultValue="INV-??" />
          </div>
          <div className="stack">
            <Switch checked={a} onChange={setA} label="自动对账" />
            <Switch checked={b} onChange={setB} label="邮件月报" />
            <Switch checked={false} disabled label="短信提醒（未开通）" />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
    setTimeout(()=>window.lucide&&window.lucide.createIcons(),60);
  </script>
</body></html>
