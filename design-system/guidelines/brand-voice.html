<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);color:var(--text-body);padding:20px 24px;display:flex;gap:18px;}
  .col{flex:1;}
  .h{font:var(--w-bold) 12px var(--font-mono);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;}
  .do .h{color:var(--success);} .dont .h{color:var(--danger);}
  .line{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px;font-size:14px;line-height:1.5;}
  .mark{flex:0 0 auto;font-weight:700;}
  .do .mark{color:var(--success);} .dont .mark{color:var(--danger);}
  .dont .line{color:var(--text-muted);}
  .div{width:1px;background:var(--border-subtle);}
</style></head><body>
  <div class="col do">
    <div class="h">✦ 这样写</div>
    <div class="line"><span class="mark">✓</span><span>把账目洗得干干净净。</span></div>
    <div class="line"><span class="mark">✓</span><span>需要报税时，功课我们替您做好了。</span></div>
    <div class="line"><span class="mark">✓</span><span>三步，搞定。</span></div>
  </div>
  <div class="div"></div>
  <div class="col dont">
    <div class="h">✦ 别这样</div>
    <div class="line"><span class="mark">✕</span><span>赋能您的财税数字化转型闭环。</span></div>
    <div class="line"><span class="mark">✕</span><span>本产品旨在为用户提供……</span></div>
    <div class="line"><span class="mark">✕</span><span>亲～快来体验吧！！😆</span></div>
  </div>
</body></html>
