<!-- @dsCard group="Colors" viewport="700x190" name="Signature Gradients" subtitle="Soap-bubble blends. Hero washes & shimmer accents." -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);color:var(--text-body);padding:22px 24px;}
  .row{display:flex;gap:14px;}
  .cell{flex:1;}
  .chip{height:78px;border-radius:var(--radius-md);box-shadow:var(--sheen);}
  .lab{margin-top:9px;font:var(--w-bold) 13px/1 var(--font-sans);color:var(--text-strong);}
  .nm{margin-top:4px;font:var(--w-regular) 10px/1 var(--font-mono);color:var(--text-subtle);}
</style></head><body>
  <div class="row">
    <div class="cell"><div class="chip" style="background:var(--grad-bubble)"></div><div class="lab">Bubble</div><div class="nm">--grad-bubble</div></div>
    <div class="cell"><div class="chip" style="background:var(--grad-shimmer)"></div><div class="lab">Shimmer</div><div class="nm">--grad-shimmer</div></div>
    <div class="cell"><div class="chip" style="background:var(--grad-foam);border:1px solid var(--border-subtle)"></div><div class="lab">Foam</div><div class="nm">--grad-foam</div></div>
    <div class="cell"><div class="chip" style="background:var(--grad-rinse);border:1px solid var(--border-subtle)"></div><div class="lab">Rinse</div><div class="nm">--grad-rinse</div></div>
  </div>
</body></html>
