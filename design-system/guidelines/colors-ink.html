<!-- @dsCard group="Colors" viewport="700x180" name="Ink — Cool Neutrals" subtitle="Teal-tinted greys. Text, borders, surfaces." -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);color:var(--text-body);padding:22px 24px;}
  .row{display:flex;gap:6px;}
  .sw{flex:1;display:flex;flex-direction:column;gap:7px;}
  .chip{height:62px;border-radius:var(--radius-sm);border:1px solid var(--ink-100);}
  .nm{font:var(--w-medium) 11px/1 var(--font-mono);color:var(--text-muted);}
  .hex{font:var(--w-regular) 10px/1 var(--font-mono);color:var(--text-subtle);}
</style></head><body>
  <div class="row" id="r"></div>
  <script>
    const steps=[50,100,200,300,400,500,600,700,800,900,950];
    const hex={50:'#F4F9F9',100:'#E9F2F2',200:'#D6E5E6',300:'#B4CBCE',400:'#8AA8AC',500:'#62858A',600:'#46676C',700:'#2B4C51',800:'#163A3F',900:'#0C2A2E',950:'#071A1D'};
    document.getElementById('r').innerHTML=steps.map(s=>`<div class="sw"><div class="chip" style="background:var(--ink-${s})"></div><div class="nm">${s}</div><div class="hex">${hex[s]}</div></div>`).join('');
  </script>
</body></html>
