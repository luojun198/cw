<!-- @dsCard group="Spacing" viewport="700x180" name="Radii" subtitle="Bubbly rounding. xs → pill." -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);color:var(--text-body);padding:22px 24px;}
  .row{display:flex;gap:16px;}
  .c{display:flex;flex-direction:column;align-items:center;gap:9px;flex:1;}
  .b{width:100%;height:66px;background:var(--mint-100);border:1.5px solid var(--mint-400);}
  .n{font:var(--w-medium) 10px/1 var(--font-mono);color:var(--text-muted);}
</style></head><body>
  <div class="row" id="r"></div>
  <script>
    const v=[['xs','6'],['sm','10'],['md','14'],['lg','20'],['xl','28'],['2xl','36'],['pill','999']];
    document.getElementById('r').innerHTML=v.map(([k,px])=>`<div class="c"><div class="b" style="border-radius:var(--radius-${k})"></div><div class="n">${k}·${px}</div></div>`).join('');
  </script>
</body></html>
