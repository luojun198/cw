<!-- @dsCard group="Spacing" viewport="700x190" name="Shadows" subtitle="Soft, cool-tinted. Plus a mint 'bubble glow'." -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-canvas);color:var(--text-body);padding:26px 24px;}
  .row{display:flex;gap:22px;}
  .c{display:flex;flex-direction:column;align-items:center;gap:11px;flex:1;}
  .b{width:100%;height:60px;background:var(--surface-card);border-radius:var(--radius-md);}
  .n{font:var(--w-medium) 10px/1 var(--font-mono);color:var(--text-muted);}
</style></head><body>
  <div class="row" id="r"></div>
  <script>
    const v=['sm','md','lg','xl','mint','blue'];
    document.getElementById('r').innerHTML=v.map(k=>`<div class="c"><div class="b" style="box-shadow:var(--shadow-${k})"></div><div class="n">${k}</div></div>`).join('');
  </script>
</body></html>
