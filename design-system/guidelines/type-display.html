<!-- @dsCard group="Type" viewport="700x190" name="Display — Space Grotesk" subtitle="Latin display & big numerals. Tabular figures for money." -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);color:var(--text-strong);padding:22px 24px;}
  .big{font:var(--w-black) 56px/1 var(--font-display);letter-spacing:var(--ls-tight);background:var(--grad-bubble);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .num{font:var(--w-bold) 40px/1 var(--font-num);font-variant-numeric:tabular-nums;letter-spacing:var(--ls-tight);margin-top:14px;color:var(--text-strong);}
  .meta{margin-top:14px;font:var(--w-regular) 11px/1.4 var(--font-mono);color:var(--text-subtle);}
</style></head><body>
  <div class="big">Wash &amp; Clean</div>
  <div class="num">¥1,284,906.50</div>
  <div class="meta">--font-display · Space Grotesk 900 · tabular-nums for ledgers</div>
</body></html>
