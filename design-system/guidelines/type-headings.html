<!-- @dsCard group="Type" viewport="700x230" name="Headings — Noto Sans SC" subtitle="Chinese headings. H1 / H2 / H3." -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);color:var(--text-strong);padding:22px 24px;display:flex;flex-direction:column;gap:14px;}
  .h1{font:var(--w-black) var(--fs-h1)/var(--lh-snug) var(--font-sans);letter-spacing:var(--ls-tight);}
  .h2{font:var(--w-bold) var(--fs-h2)/var(--lh-heading) var(--font-sans);}
  .h3{font:var(--w-medium) var(--fs-h3)/var(--lh-heading) var(--font-sans);color:var(--text-body);}
  .tag{font:var(--w-regular) 10px/1 var(--font-mono);color:var(--text-subtle);margin-left:10px;}
</style></head><body>
  <div class="h1">把账目洗得干干净净<span class="tag">H1 · 36/900</span></div>
  <div class="h2">您的财务专家，随叫随到<span class="tag">H2 · 28/700</span></div>
  <div class="h3">三步搞定记账、对账与报税<span class="tag">H3 · 22/500</span></div>
</body></html>
