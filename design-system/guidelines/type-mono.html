<!-- @dsCard group="Type" viewport="700x170" name="Mono & Overline — Space Mono" subtitle="Ledger labels, codes, metadata, eyebrow overlines." -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);color:var(--text-body);padding:22px 24px;display:flex;flex-direction:column;gap:14px;}
  .over{font:var(--w-bold) var(--fs-overline) var(--font-mono);letter-spacing:var(--ls-overline);text-transform:uppercase;color:var(--mint-600);}
  .mono{font:var(--w-regular) 14px var(--font-mono);color:var(--text-body);}
  .row{display:flex;gap:24px;align-items:baseline;}
  .meta{font:var(--w-regular) 11px/1 var(--font-mono);color:var(--text-subtle);}
</style></head><body>
  <div class="over">· 实时同步 / LIVE SYNC ·</div>
  <div class="row">
    <span class="mono">TXN-2026-0042</span>
    <span class="mono">+¥ 3,280.00</span>
    <span class="mono">2026-06-09</span>
  </div>
  <div class="meta">--font-mono · Space Mono · overline uses 0.16em tracking, uppercase</div>
</body></html>
