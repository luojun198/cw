<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);color:var(--text-body);padding:22px 24px;}

  <p class="lead">记账不该让人头大。我们帮您把每一笔流水洗得清清爽爽。</p>

  <div class="meta">--text-body · 16/1.75 · body-lg 18/1.75</div>
